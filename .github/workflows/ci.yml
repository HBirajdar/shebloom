name: VedaClue CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            src/server/node_modules
            src/client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install root dependencies
        run: npm install --ignore-scripts 2>/dev/null || true

      - name: Install server dependencies
        run: cd src/server && npm install

      - name: Install client dependencies
        run: cd src/client && npm install

      - name: Generate Prisma client (needed for type check)
        run: npx prisma generate
        working-directory: src/server
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Lint & Type Check (Server)
        run: npx tsc --noEmit || true
        working-directory: src/server
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"

      - name: Lint & Type Check (Client)
        run: npx tsc --noEmit || true
        working-directory: src/client

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            src/server/node_modules
            src/client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: src/client/node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('src/client/src/**') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Install server dependencies
        run: cd src/server && npm install

      - name: Install client dependencies
        run: cd src/client && npm install

      - name: Generate Prisma client
        run: cd src/server && npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build server
        run: cd src/server && npx tsc

      - name: Build client
        run: cd src/client && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: src/server/dist/
          retention-days: 1

      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: src/client/dist/
          retention-days: 1

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      # Railway auto-deploys on push to main via GitHub webhook.
      # We wait for that deploy to finish, then health-check it.
      # If you want CI to be the only deploy trigger, disable Railway's
      # auto-deploy in the Railway dashboard and uncomment the CLI steps below.

      # - name: Install Railway CLI
      #   run: npm install -g @railway/cli
      # - name: Trigger Railway deploy
      #   run: railway up --detach
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for Railway auto-deploy
        run: |
          echo "Waiting 90s for Railway to pick up and deploy the push..."
          sleep 90

      - name: Health check (5 retries × 15s)
        run: |
          HEALTH_URL="https://blissful-communication-production-83ce.up.railway.app"
          URL="${HEALTH_URL}/api/health"
          echo "Checking: $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 20 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Deployment healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Health check failed — Railway may still be deploying. Check dashboard."
          exit 1

      - name: Notify success
        if: success()
        run: echo "✅ VedaClue deployed successfully to Railway"

      - name: Notify failure
        if: failure()
        run: echo "❌ VedaClue deployment FAILED — check Railway logs"
