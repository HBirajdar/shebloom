<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F43F5E"/>
      <stop offset="60%" stop-color="#DB2777"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="32" fill="url(#glow)"/>

  <!-- Lotus petals -->
  <!-- Top petal -->
  <ellipse cx="32" cy="22" rx="7" ry="12" fill="#fce7f3" fill-opacity="0.90" transform="rotate(0 32 32)"/>
  <!-- Left petal -->
  <ellipse cx="32" cy="22" rx="7" ry="12" fill="#fce7f3" fill-opacity="0.85" transform="rotate(-55 32 32)"/>
  <!-- Right petal -->
  <ellipse cx="32" cy="22" rx="7" ry="12" fill="#fce7f3" fill-opacity="0.85" transform="rotate(55 32 32)"/>
  <!-- Bottom-left petal -->
  <ellipse cx="32" cy="22" rx="6" ry="10" fill="#fce7f3" fill-opacity="0.70" transform="rotate(-110 32 32)"/>
  <!-- Bottom-right petal -->
  <ellipse cx="32" cy="22" rx="6" ry="10" fill="#fce7f3" fill-opacity="0.70" transform="rotate(110 32 32)"/>

  <!-- Stem -->
  <rect x="30" cy="40" width="4" height="10" rx="2" fill="#fbcfe8" fill-opacity="0.75" x="30" y="40"/>

  <!-- Centre glow -->
  <circle cx="32" cy="32" r="6" fill="#fff" fill-opacity="0.55"/>
  <circle cx="32" cy="32" r="3.5" fill="#fff"/>
</svg>
