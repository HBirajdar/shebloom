# Single-service Railway deployment: builds both client + server, serves everything from Express.
# To use: set Root Directory to repo root (not src/client or src/server).

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = [
  "npm run build -w src/client",
  "npm run build -w src/server"
]

[start]
cmd = "npm start"

[variables]
NODE_ENV = "production"
